name: Release Publisher

on:
  push:
    tags:
      - "*.*.*"
      - "*.*.*-dev"

permissions:
  contents:
    - read
    - write

jobs:
  release:
    name: Create Release
    steps:
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
