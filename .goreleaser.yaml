version: 2

project_name: atun

builds:
  - id: atun
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: release_archive
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

release:
  github:
    owner: automationd
    name: atun
  draft: true

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

brews:
  - name: atun
    repository:
      owner: AutomationD
      name: homebrew-atun
    url_template: "https://github.com/automationd/atun/releases/download/{{ .Tag }}/{{ .ArtifactName }}"
    commit_author:
      name: Dmitry Kireev
      email: dmitry@atd.sh
    homepage: "https://github.com/automationd/atun"
    description: "atun - Atun - AWS Tagged Tunnel"
    license: "Apache 2.0"
    test: |
      system "#{bin}/atun version"
    install: |
      bin.install "atun"
